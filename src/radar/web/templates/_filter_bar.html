{# Client-side filter controls for the #radar-table. Context: cards (for the
   category options). Progressive enhancement — without JS the table shows in
   full; the script only hides non-matching rows. #}
<div class="filter-bar">
  <input id="filter-text" type="text" placeholder="Search projects…"
         oninput="radarFilter()" aria-label="Search projects">
  <select id="filter-category" onchange="radarFilter()" aria-label="Filter by category">
    <option value="">All categories</option>
    {% for cat in cards | map(attribute='category.value') | unique | sort %}
    <option value="{{ cat }}">{{ cat }}</option>
    {% endfor %}
  </select>
  <select id="filter-backer" onchange="radarFilter()" aria-label="Filter by backer">
    <option value="">Any backer</option>
    {% for bt in cards | selectattr('backer') | map(attribute='backer.type.value') | unique | sort %}
    <option value="{{ bt }}">{{ bt | replace('_', ' ') | title }}</option>
    {% endfor %}
  </select>
</div>
