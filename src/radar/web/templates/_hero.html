{# Brand header. Context: page_title, tagline, generated_at, nav (label->url). #}
<header class="hero">
  <div class="container">
    <div class="brand-lockup">
      <img class="brand-logo" src="{{ asset_base }}static/brand/mega-logo-white.png"
           alt="mega bilgisayar — Bilişim Teknolojileri" width="220" height="71" />
    </div>
    <h1>{{ page_title }}</h1>
    <p class="tagline">{{ tagline }}</p>
    <nav class="hero-nav">
      {% for label, url in nav.items() %}{% if url %}<a href="{{ url }}">{{ label }}</a>{% endif %}{% endfor %}
    </nav>
    {% if generated_at %}<p class="generated">Updated {{ generated_at }}</p>{% endif %}
  </div>
</header>
