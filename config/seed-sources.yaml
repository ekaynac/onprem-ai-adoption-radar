quotas:
  coding_agents: 10
  general_agents: 10
  mcp_tooling: 10
  sandbox_governance: 10
  agent_frameworks: 10
  model_serving: 10
  ai_infrastructure: 10
  physical_ai_infrastructure: 10
  fun_experimental: 10
scoring:
  default_ring: watch
  security_penalty_tags:
    - terminal-access
    - file-write-access
    - persistent-agent
    - browser-access

# Optional LLM analyst for the firehose tail. OFF by default — the pipeline is
# fully deterministic and offline unless you enable this. It only runs on
# firehose entries the deterministic matcher could not place, and only maps to
# existing tracked projects. Defaults target a local Ollama-style endpoint.
llm:
  enabled: false
  base_url: http://localhost:11434/v1
  model: qwen2.5:3b
  api_key_env: RADAR_LLM_API_KEY
  timeout_seconds: 20

# Named scoring profiles: per-dimension weight presets. The default decision
# uses equal weights; `radar report --profile security-first` (or
# `radar scan --profile ...`) re-ranks the SAME observed data through one of
# these lenses. Unspecified dimensions default to weight 1.0.
profiles:
  security-first:
    security_posture: 3.0
    on_prem_relevance: 2.0
    setup_friction: 0.5
    demo_value: 0.5
  solo-dev:
    laptop_runnability: 2.5
    setup_friction: 2.0
    demo_value: 1.5
    on_prem_relevance: 0.5
  demo-hunter:
    demo_value: 3.0
    workflow_impact: 2.0
    setup_friction: 1.5
    on_prem_relevance: 0.5

# Per-project enrichment (advisories, community traction, downloads). All on by
# default and individually togglable; every call degrades gracefully so a scan
# never fails because an enrichment endpoint is down.
enrichment:
  osv: true
  hackernews: true
  downloads: true
  timeout_seconds: 15
  advisory_window_days: 90

# Optional post-scan webhook. OFF by default. Fires only when a scan produced
# ring changes. The URL is read from the environment (never stored here);
# format 'slack' posts {"text": ...}, compatible with Slack/Discord/Teams.
notify:
  enabled: false
  webhook_url: ${RADAR_WEBHOOK_URL}
  format: generic
  timeout_seconds: 10
