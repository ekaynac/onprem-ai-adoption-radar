name: Publish radar to Pages

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - ".github/workflows/publish.yml"

permissions:
  contents: write # commit the durable history log back to the repo
  pages: write
  id-token: write

# Allow only one concurrent deployment, don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Full history is needed so the committed history log carries forward.
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv venv && uv pip install -e .

      - name: Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run radar init --root .
          uv run radar scan --root . --days 7

      # Quality gate: fail the run if scoring collapsed (rings stopped
      # discriminating). Runs on the persisted scan, before publishing.
      - name: Scoring quality gate
        run: uv run radar calibrate-report --root . --check

      # `radar export` copies data/history.jsonl into the site for download.
      - name: Export static site
        run: uv run radar export --root . --out _site

      # Persist the durable JSONL history log back to the repo. This makes the
      # timeline durable (in git, not an evictable cache) AND counts as repo
      # activity, so GitHub never auto-disables the daily schedule after 60 idle
      # days. `--allow-empty` guarantees a daily heartbeat even when nothing
      # moved; `[skip ci]` keeps the bot commit from re-triggering workflows.
      - name: Persist history log + keepalive
        if: always()
        run: |
          git config user.name "radar-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/history.jsonl || true
          git commit --allow-empty -m "chore: radar history $(date -u +%F) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
