name: Publish radar to Pages

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv venv && uv pip install -e .

      # Persist the durable JSONL history log across runs so the timeline
      # accumulates. The SQLite DB is just a cache rebuilt from this log, so we
      # only need to carry the log forward.
      - name: Restore radar history log
        uses: actions/cache/restore@v5
        with:
          path: data/history.jsonl
          key: radar-history-${{ github.run_id }}
          restore-keys: |
            radar-history-

      - name: Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run radar init --root .
          uv run radar scan --root . --days 7

      # Quality gate: fail the run if scoring collapsed (rings stopped
      # discriminating). Runs on the persisted scan, before publishing.
      - name: Scoring quality gate
        run: uv run radar calibrate-report --root . --check

      - name: Export static site
        run: uv run radar export --root . --out _site

      - name: Save radar history log
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/history.jsonl
          key: radar-history-${{ github.run_id }}

      # Also publish the durable log as a Pages artifact so the full timeline is
      # downloadable and not dependent on the (evictable) Actions cache.
      - name: Include history log in site
        if: always()
        run: cp -f data/history.jsonl _site/history.jsonl || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
