name: Publish radar to Pages

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config/**"
      - "src/**"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv venv && uv pip install -e .

      # Persist the SQLite DB across runs so project history accumulates.
      - name: Restore radar history
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: |
            radar-db-

      - name: Scan and export
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run radar init --root .
          uv run radar scan --root . --days 7
          uv run radar export --root . --out _site

      - name: Save radar history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
